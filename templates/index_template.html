<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Zerotier Monitor</title>
    <style>
        body { font-family: Arial; background: #111; color: #eee; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #333; }
        .online { color: #4CAF50; font-weight: bold; }
        .offline { color: #F44336; font-weight: bold; }
    </style>
</head>
<body>
<h1>Estado de nodos ZeroTier</h1>

<table>
    <tr>
        <th>Nombre</th>
        <th>ID</th>
        <th>IP</th>
        <th>Estado</th>
    </tr>
    {% for m in members %}
    <tr>
        <td>{{ m.name }}</td>
        <td>{{ m.id }}</td>
        <td>{{ m.ip }}</td>
        <td class="{{ m.status }}">{{ m.status|capitalize }}</td>
    </tr>
    {% endfor %}
</table>

<p>Última actualización: {{ timestamp }}</p>
</body>
</html>
