services:
  zerotier-monitor:
    build: .
    container_name: zerotier-monitor
    user: "1000:1000"
    env_file: .env
    environment:
      - SSH_CONFIG_FILE=/home/sherlockes/.ssh/config
      - HOME=/home/sherlockes
      - TZ=Europe/Madrid
    volumes:
      - ./data:/app/data
      - ~/.ssh:/home/sherlockes/.ssh
      # Montamos el archivo de configuración directamente.
      # Al hacer esto, Docker resuelve automáticamente cualquier enlace simbólico
      # en el host sin importar a dónde apunte, y monta el archivo destino real.
      - ~/.ssh/config:/home/sherlockes/.ssh/config
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "8081:8080"
    restart: unless-stopped
